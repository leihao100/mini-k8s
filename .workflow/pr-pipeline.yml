version: '1.0'
name: pr-pipeline
displayName: PRPipeline
triggers:
  trigger: auto
  pr:
    branches:
      include:
        - master
stages:
  - name: compile
    displayName: 编译
    strategy: naturally
    trigger: auto
    steps:
      - step: build@golang
        name: build_golang
        displayName: Golang 构建
        golangVersion: '1.22'
        commands:
          - export GOPROXY=https://goproxy.cn
          - ''
          - mkdir output
          - ''
          - cd cmd
          - ''
          - for dir in */ ; do
          - '    cmdname="${dir%/}"'
          - '    echo "Building $cmdname..."'
          - '    (cd "$dir" && go build -o "../../output/$cmdname")'
          - done
          - ''
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./output
        caches:
          - /go/pkg/mod
        strategy: {}
      - step: publish@general_artifacts
        name: publish_general_artifacts
        displayName: 上传制品
        dependArtifact: BUILD_ARTIFACT
        artifactName: output
        dependsOn: build_golang
