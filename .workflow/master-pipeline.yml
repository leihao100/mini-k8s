version: '1.0'
name: master-pipeline
displayName: MasterPipeline
triggers:
  trigger: auto
  push:
    branches:
      include:
        - master
stages:
  - name: compile
    displayName: 编译
    strategy: naturally
    trigger: auto
    steps:
      - step: build@golang
        name: build_golang
        displayName: Golang 构建
        golangVersion: '1.22'
        commands:
          - export GOPROXY=https://goproxy.cn
          - ''
          - mkdir output
          - ''
          - cd cmd
          - ''
          - for dir in */ ; do
          - '    cmdname="${dir%/}"'
          - '    echo "Building $cmdname..."'
          - '    (cd "$dir" && go build -o "../../output/$cmdname")'
          - done
          - ''
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./output
        strategy: {}
      - step: publish@general_artifacts
        name: publish_general_artifacts
        displayName: 上传制品
        dependArtifact: BUILD_ARTIFACT
        artifactName: output
        strategy: {}
        dependsOn: build_golang
  - name: release
    displayName: 发布
    strategy: naturally
    trigger: auto
    steps:
      - step: publish@release_artifacts
        name: publish_release_artifacts
        displayName: 发布
        dependArtifact: output
        version: 1.0.0.0
        autoIncrement: true
      - step: deploy@agent
        name: deploy_agent
        displayName: 主机部署
        hostGroupID:
          ID: jcloud
          hostID:
            - f9752a5a-781a-4d1b-a5a0-35fa053f69bf
            - f72fe729-4ad5-4b1d-bf05-2268a437e337
            - 5a9c90b3-3111-401c-bd1b-dafbf17be5ab
        deployArtifact:
          - source: build
            name: output
            target: ~/gitee_go/deploy
            dependArtifact: BUILD_ARTIFACT
        script:
          - '#!/bin/bash'
          - ''
          - deploy_path="/usr/local/minik8s-deploy"
          - ''
          - if [ -d "$deploy_path" ]; then
          - '    # 目录存在，清空目录内容'
          - '    rm -rf "$deploy_path"/*'
          - '    echo "cleared: $deploy_path"'
          - else
          - '    # 目录不存在，创建目录'
          - '    mkdir -p "$deploy_path"'
          - '    echo "created: $deploy_path"'
          - fi
          - ''
          - tar zxvf ~/gitee_go/deploy/output.tar.gz -C $deploy_path
          - ''
        notify: []
        strategy:
          retry: '0'
